<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAILY SAFE</title>
    <!-- Підключаємо шрифти через preconnect для швидкості -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        /* ===== ЗМІННІ ===== */
        :root {
            --gold: #c5a059;
            --gold-light: #e8c97a;
            --gold-dark: #8a6a2a;
            --dark: #0a0a0a;
            --dark2: #111;
            --dark3: #1a1a1a;
            --text: #d1d1d1;
            --red: #8b1a1a;

            /* Фіксовані розміри шрифтів — однакові на всіх пристроях */
            --fs-title: clamp(18px, 5vw, 28px);
            --fs-body: clamp(13px, 3.5vw, 16px);
            --fs-timer: clamp(32px, 9vw, 52px);
            --fs-label: clamp(10px, 2.5vw, 13px);
            --fs-btn: clamp(14px, 3.5vw, 18px);
            --fs-result: clamp(14px, 3.8vw, 18px);
        }

        /* ===== RESET ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ===== BODY ===== */
        body {
            background-color: var(--dark);
            color: var(--text);
            /* Cinzel — чіткий на всіх пристроях, немає системних замін */
            font-family: 'Cinzel', 'Times New Roman', serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at top, rgba(197,160,89,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at bottom, rgba(139,26,26,0.04) 0%, transparent 60%),
                linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.96)),
                url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
        }

        /* ===== ЗЕРНИСТІСТЬ для атмосфери ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* ===== ЗАГОЛОВОК ===== */
        .title {
            font-family: 'Cinzel', serif;
            font-size: var(--fs-title);
            font-weight: 900;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            text-align: center;
            margin-bottom: 6px;
            position: relative;
            text-shadow: 0 0 30px rgba(197,160,89,0.4), 0 2px 4px rgba(0,0,0,0.8);
        }
        .subtitle {
            font-family: 'IM Fell English', serif;
            font-style: italic;
            font-size: var(--fs-label);
            color: var(--gold-dark);
            letter-spacing: 0.1em;
            text-align: center;
            margin-bottom: 24px;
        }

        /* ===== ДЕКОРАТИВНА ЛІНІЯ ===== */
        .divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 24px;
        }

        /* ===== WRAPPER КОЛЕСА ===== */
        .wheel-wrapper {
            position: relative;
            width: min(280px, 75vw);
            height: min(280px, 75vw);
            margin: 0 auto 28px;
        }

        /* Зовнішнє кільце — декоративне */
        .wheel-outer-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(
                var(--gold-dark) 0deg, var(--gold) 30deg, var(--gold-dark) 60deg,
                var(--gold) 90deg, var(--gold-dark) 120deg, var(--gold) 150deg,
                var(--gold-dark) 180deg, var(--gold) 210deg, var(--gold-dark) 240deg,
                var(--gold) 270deg, var(--gold-dark) 300deg, var(--gold) 330deg,
                var(--gold-dark) 360deg
            );
            box-shadow: 0 0 25px rgba(197,160,89,0.35), inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Контейнер колеса */
        .wheel-container {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            overflow: hidden;
            background: var(--dark2);
        }

        /* Саме колесо */
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 3.5s cubic-bezier(0.17, 0.67, 0.12, 1);
            /* Кольори секторів відповідно до шансів */
            background: conic-gradient(
                #1a1a1a 0% 65%,
                #2c2416 65% 83%,
                #1e2a1e 83% 93%,
                #1a2030 93% 98%,
                #3d2e08 98% 100%
            );
        }

        /* Центральна точка */
        .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--gold-light), var(--gold-dark));
            box-shadow: 0 0 10px rgba(197,160,89,0.6);
            z-index: 5;
        }

        /* Стрілка-вказівник */
        .wheel-pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            filter: drop-shadow(0 0 6px rgba(197,160,89,0.8));
        }
        .wheel-pointer svg { display: block; }

        /* Мітки секторів на колесі */
        .sector-labels {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
        }
        .sector-label {
            position: absolute;
            top: 50%; left: 50%;
            font-family: 'Cinzel', serif;
            font-size: clamp(8px, 2vw, 11px);
            font-weight: 700;
            color: rgba(197,160,89,0.7);
            white-space: nowrap;
            transform-origin: 0 0;
            pointer-events: none;
        }

        /* ===== КНОПКА ===== */
        .btn-spin {
            position: relative;
            background: linear-gradient(135deg, #1a1400, #2a2000, #1a1400);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: var(--fs-btn);
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 14px 40px;
            border: 1px solid var(--gold-dark);
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
            box-shadow:
                0 0 20px rgba(197,160,89,0.2),
                inset 0 1px 0 rgba(197,160,89,0.1);
            overflow: hidden;
        }
        .btn-spin::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(197,160,89,0.08) 100%);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .btn-spin:not(:disabled):active {
            transform: scale(0.97);
            box-shadow: 0 0 10px rgba(197,160,89,0.15);
        }
        .btn-spin:not(:disabled):hover::before { opacity: 1; }
        .btn-spin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* Пульсація кнопки до натискання */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(197,160,89,0.2), inset 0 1px 0 rgba(197,160,89,0.1); }
            50% { box-shadow: 0 0 35px rgba(197,160,89,0.4), inset 0 1px 0 rgba(197,160,89,0.2); }
        }
        .btn-spin.pulse { animation: pulse-glow 2s ease-in-out infinite; }

        /* ===== GAME VIEW ===== */
        #game-view {
            display: none;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 360px;
        }

        /* ===== ТАЙМЕР ===== */
        #timer-container {
            display: none;
            text-align: center;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 320px;
        }
        .timer-box {
            border: 1px solid var(--gold-dark);
            padding: 32px 24px;
            background: rgba(0,0,0,0.7);
            box-shadow: 0 0 40px rgba(197,160,89,0.08), inset 0 0 60px rgba(0,0,0,0.5);
            position: relative;
        }
        /* Кутові декори */
        .timer-box::before, .timer-box::after {
            content: '◆';
            position: absolute;
            color: var(--gold-dark);
            font-size: 10px;
        }
        .timer-box::before { top: 8px; left: 12px; }
        .timer-box::after { bottom: 8px; right: 12px; }

        .timer-icon {
            font-size: 28px;
            margin-bottom: 8px;
            filter: grayscale(0.3);
        }
        .timer-label {
            font-family: 'IM Fell English', serif;
            font-style: italic;
            font-size: var(--fs-label);
            color: var(--gold-dark);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 16px;
        }
        .timer-digits {
            font-family: 'Cinzel', serif;
            font-size: var(--fs-timer);
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 0.05em;
            text-shadow: 0 0 20px rgba(197,160,89,0.5);
            line-height: 1;
            margin-bottom: 16px;
            /* Моноширний для стабільності цифр */
            font-variant-numeric: tabular-nums;
        }
        .timer-digits span {
            display: inline-block;
            min-width: 0.65em;
            text-align: center;
        }
        .timer-separator { color: var(--gold-dark); margin: 0 2px; }
        .timer-sub {
            font-size: var(--fs-label);
            color: #444;
            letter-spacing: 0.1em;
        }

        /* Прогрес-бар */
        .timer-progress {
            width: 100%;
            height: 2px;
            background: rgba(197,160,89,0.1);
            margin: 20px 0 0;
            position: relative;
            overflow: hidden;
        }
        .timer-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold));
            transition: width 1s linear;
            box-shadow: 0 0 8px rgba(197,160,89,0.5);
        }

        /* ===== МОДАЛЬНЕ ВІКНО РЕЗУЛЬТАТУ ===== */
        #result-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #result-modal.show { display: flex; }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            animation: fadeIn 0.3s ease;
        }
        .modal-box {
            position: relative;
            z-index: 1;
            background: linear-gradient(160deg, #0f0f0f, #1a1500, #0f0f0f);
            border: 1px solid var(--gold-dark);
            padding: 32px 28px;
            width: 100%;
            max-width: 300px;
            text-align: center;
            animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 60px rgba(197,160,89,0.2), 0 20px 60px rgba(0,0,0,0.8);
        }
        /* Кутові декори модалки */
        .modal-corner {
            position: absolute;
            width: 16px; height: 16px;
            border-color: var(--gold);
            border-style: solid;
        }
        .modal-corner.tl { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
        .modal-corner.tr { top: 6px; right: 6px; border-width: 1px 1px 0 0; }
        .modal-corner.bl { bottom: 6px; left: 6px; border-width: 0 0 1px 1px; }
        .modal-corner.br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }

        .modal-icon { font-size: 42px; margin-bottom: 12px; display: block; }
        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: var(--fs-result);
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        .modal-prize {
            font-family: 'IM Fell English', serif;
            font-style: italic;
            font-size: clamp(16px, 4.5vw, 22px);
            color: var(--gold-light);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(232,201,122,0.4);
            line-height: 1.3;
        }
        .modal-sub {
            font-size: var(--fs-label);
            color: #555;
            letter-spacing: 0.1em;
        }

        /* Частинки для великих виграшів */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--gold);
            animation: particle-fall 1.5s ease-out forwards;
        }

        /* ===== АНІМАЦІЇ ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes particle-fall {
            0% { opacity: 1; transform: translateY(-10px) rotate(0deg); }
            100% { opacity: 0; transform: translateY(200px) rotate(720deg); }
        }
        @keyframes spin-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .game-view-enter {
            animation: spin-in 0.5s ease forwards;
        }
    </style>
</head>
<body>

    <canvas id="bg-fx-canvas" style="position:fixed; inset:0; z-index:0; pointer-events:none;"></canvas>


    <!-- Аудіо -->
    <audio id="audioTheme" src="mafia_theme.mp3" loop preload="auto"></audio>
    <audio id="audioSpin" src="spin.mp3" preload="auto"></audio>
    <audio id="audioWin" src="win.mp3" preload="auto"></audio>
    <audio id="audioSuccess" src="success.mp3" preload="auto"></audio>
    <audio id="audioLose" src="lose.mp3" preload="auto"></audio>

    <!-- GAME VIEW -->
    <div id="game-view">
        <div class="title">Сейф Дона</div>
        <div class="subtitle">Щоденна удача сім'ї</div>
        <div class="divider"></div>

        <div class="wheel-wrapper" id="wheel-wrapper">
            <!-- Зовнішнє золоте кільце -->
            <div class="wheel-outer-ring"></div>
            <!-- Стрілка -->
            <div class="wheel-pointer">
                <svg width="24" height="28" viewBox="0 0 24 28">
                    <polygon points="12,2 22,26 12,20 2,26" fill="#c5a059" stroke="#8a6a2a" stroke-width="1"/>
                </svg>
            </div>
            <!-- Колесо -->
            <div class="wheel-container">
                <div id="wheel"></div>
            </div>
            <!-- Центральна точка -->
            <div class="wheel-center"></div>
        </div>

        <button id="spin-button" class="btn-spin pulse" onclick="spinWheel()">
            ВІДКРИТИ СЕЙФ
        </button>
    </div>

    <!-- TIMER VIEW -->
    <div id="timer-container">
        <div class="timer-box">
            <div class="timer-icon">🔒</div>
            <div class="timer-label">Сейф заблоковано — доступ через</div>
            <div class="timer-digits">
                <span id="t-h">00</span>
                <span class="timer-separator">:</span>
                <span id="t-m">00</span>
                <span class="timer-separator">:</span>
                <span id="t-s">00</span>
            </div>
            <div class="timer-sub">Система безпеки активна</div>
            <div class="timer-progress">
                <div class="timer-progress-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- RESULT MODAL -->
    <div id="result-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-box">
            <div class="modal-corner tl"></div>
            <div class="modal-corner tr"></div>
            <div class="modal-corner bl"></div>
            <div class="modal-corner br"></div>
            <div class="particles" id="particles"></div>
            <span class="modal-icon" id="modal-icon">🎲</span>
            <div class="modal-title" id="modal-title">РЕЗУЛЬТАТ</div>
            <div class="modal-prize" id="modal-prize">—</div>
            <div class="modal-sub" id="modal-sub">Закриття...</div>
            <button id="modal-close-btn" onclick="closeWheelApp()" style="
                display:none;
                margin-top:18px;
                background: linear-gradient(135deg, #1a1400, #2a2000);
                color: var(--gold);
                font-family: 'Cinzel', serif;
                font-size: clamp(13px, 3.5vw, 16px);
                font-weight: 700;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                padding: 12px 32px;
                border: 1px solid var(--gold-dark);
                cursor: pointer;
                width: 100%;
            ">Закрити</button>
        </div>
    </div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ===== ІНІЦІАЛІЗАЦІЯ =====
    const urlParams = new URLSearchParams(window.location.search);
    const urlSpin = urlParams.get('spin');

    // Безпечний localStorage (може бути недоступний в деяких Telegram клієнтах)
    function safeStorage(action, key, value) {
        try {
            if (action === 'get') return localStorage.getItem(key);
            if (action === 'set') localStorage.setItem(key, value);
            if (action === 'remove') localStorage.removeItem(key);
        } catch(e) { return null; }
    }

    function parseDate(str) {
        if (!str || str === 'never' || str === 'None' || str === 'null' || str === 'undefined') return null;
        let formatted = str.replace(' ', 'T');
        if (!formatted.includes('Z')) formatted += 'Z';
        const d = new Date(formatted);
        return isNaN(d.getTime()) ? null : d;
    }

    const dateUrl = parseDate(urlSpin);
    const dateLocal = parseDate(safeStorage('get', 'mafia_last_spin'));
    let lastSpinDate = null;

    if (!dateUrl && (urlSpin === 'never' || urlSpin === 'None' || !urlSpin)) {
        safeStorage('remove', 'mafia_last_spin');
        lastSpinDate = null;
    } else if (dateUrl) {
        lastSpinDate = (dateLocal && dateLocal > dateUrl) ? dateLocal : dateUrl;
    } else {
        lastSpinDate = dateLocal;
    }

    // ===== ЕЛЕМЕНТИ =====
    const timerContainer = document.getElementById('timer-container');
    const gameView = document.getElementById('game-view');
    const spinBtn = document.getElementById('spin-button');
    const wheel = document.getElementById('wheel');
    const resultModal = document.getElementById('result-modal');

    // ===== АУДІО =====
    let themePlaying = false;
    function playTheme() {
        if (themePlaying) return;
        const audio = document.getElementById('audioTheme');
        audio.volume = 0.15;
        audio.play().catch(() => {});
        themePlaying = true;
    }
    function playSound(id, volume = 0.7) {
        const audio = document.getElementById(id);
        if (!audio) return;
        audio.currentTime = 0;
        audio.volume = volume;
        audio.play().catch(() => {});
    }

    // ===== ТАЙМЕР =====
    let timerInterval = null;
    let spinStartTime = null; // час коли останній раз крутили (для прогрес-бару)

    function updateView() {
        if (!lastSpinDate) {
            showGame();
            return;
        }
        const now = new Date();
        const nextDate = new Date(lastSpinDate.getTime() + 24 * 60 * 60 * 1000);
        const diff = nextDate - now;

        if (diff <= 0) {
            showGame();
        } else {
            showTimer(diff, nextDate);
        }
    }

    function showGame() {
        timerContainer.style.display = 'none';
        gameView.style.display = 'flex';
        gameView.classList.add('game-view-enter');
        // Запускаємо музику при першій взаємодії
        document.addEventListener('click', playTheme, { once: true });
    }

    function showTimer(diff, nextDate) {
        gameView.style.display = 'none';
        timerContainer.style.display = 'block';

        const totalMs = 24 * 60 * 60 * 1000;
        const elapsed = totalMs - diff;
        const progress = Math.min(100, (elapsed / totalMs) * 100);
        document.getElementById('progress-fill').style.width = progress + '%';

        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const now2 = new Date();
            const diff2 = nextDate - now2;
            if (diff2 <= 0) {
                clearInterval(timerInterval);
                updateView();
                return;
            }
            const h = Math.floor(diff2 / 3600000);
            const m = Math.floor((diff2 % 3600000) / 60000);
            const s = Math.floor((diff2 % 60000) / 1000);
            document.getElementById('t-h').textContent = String(h).padStart(2, '0');
            document.getElementById('t-m').textContent = String(m).padStart(2, '0');
            document.getElementById('t-s').textContent = String(s).padStart(2, '0');

            const p = Math.min(100, ((totalMs - diff2) / totalMs) * 100);
            document.getElementById('progress-fill').style.width = p + '%';
        }, 1000);

        // Перший показ
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('t-h').textContent = String(h).padStart(2, '0');
        document.getElementById('t-m').textContent = String(m).padStart(2, '0');
        document.getElementById('t-s').textContent = String(s).padStart(2, '0');
    }

    updateView();

    // ===== ПОКАЗ РЕЗУЛЬТАТУ =====
    function showResult(prize, amount) {
        const modal = resultModal;
        const icon = document.getElementById('modal-icon');
        const title = document.getElementById('modal-title');
        const prizeEl = document.getElementById('modal-prize');
        const sub = document.getElementById('modal-sub');
        const particles = document.getElementById('particles');
        const closeBtn = document.getElementById('modal-close-btn');

        particles.innerHTML = '';

        if (amount === 0 && !prize.includes('👑')) {
            // Програш
            icon.textContent = '💨';
            title.textContent = 'СЕЙФ ПОРОЖНІЙ';
            prizeEl.textContent = 'Сьогодні Дон нічого не залишив...';
            prizeEl.style.color = '#666';
            sub.textContent = 'Спробуй завтра';
        } else if (prize.includes('👑')) {
            // Джекпот
            icon.textContent = '👑';
            title.textContent = 'ДЖЕКПОТ!';
            prizeEl.textContent = prize.replace('👑 ', '');
            prizeEl.style.color = 'var(--gold-light)';
            sub.textContent = 'Сімʼя пишається тобою';
            spawnParticles(particles, 30);
        } else {
            // Звичайний виграш
            if (prize.includes('🪙')) { icon.textContent = '🪙'; title.textContent = 'МІДЬ СІМʼЇ'; }
            else if (prize.includes('💰')) { icon.textContent = '💰'; title.textContent = 'ГАМАНЕЦЬ ДОНА'; }
            else if (prize.includes('🏦')) { icon.textContent = '🏦'; title.textContent = 'СЕЙФ ВІДКРИТО!'; spawnParticles(particles, 15); }
            prizeEl.textContent = prize.replace(/[🪙💰🏦]/g, '').trim();
            prizeEl.style.color = 'var(--gold-light)';
            sub.textContent = 'Дінеро нараховано';
        }

        modal.classList.add('show');

        // Показуємо кнопку "Закрити" з невеликою затримкою — щоб юзер встиг побачити результат
        closeBtn.style.display = 'none';
        setTimeout(() => {
            closeBtn.style.display = 'block';
        }, 600);
    }

    function spawnParticles(container, count) {
        const colors = ['#c5a059', '#e8c97a', '#fff8dc', '#8a6a2a'];
        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 40 + '%';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.animationDelay = Math.random() * 0.5 + 's';
            p.style.animationDuration = (1 + Math.random()) + 's';
            p.style.width = p.style.height = (3 + Math.random() * 4) + 'px';
            container.appendChild(p);
        }
    }

    // ===== СПІН =====
    function spinWheel() {
        playTheme();
        spinBtn.disabled = true;
        spinBtn.classList.remove('pulse');
        spinBtn.textContent = 'КРУТИМО...';

        playSound('audioSpin', 0.6);

        const randomDeg = Math.floor(Math.random() * 360) + 1440 + Math.floor(Math.random() * 360);
        wheel.style.transition = 'transform 3.5s cubic-bezier(0.17, 0.67, 0.12, 1)';
        wheel.style.transform = `rotate(${randomDeg}deg)`;

        setTimeout(() => {
            const chance = Math.random() * 100;
            let result = { action: 'wheel_win', prize_name: 'Нічого', amount: 0 };

            if (chance < 65) {
                result = { action: 'wheel_win', prize_name: 'Порожньо 💨', amount: 0 };
                playSound('audioLose', 0.5);
            } else if (chance < 83) {
                const val = Math.floor(Math.random() * 2) + 1;
                result = { action: 'wheel_win', prize_name: `${val} ₲ (Мідь 🪙)`, amount: val };
                playSound('audioWin', 0.6);
            } else if (chance < 93) {
                const val = Math.floor(Math.random() * 11) + 5;
                result = { action: 'wheel_win', prize_name: `${val} ₲ (Гаманець 💰)`, amount: val };
                playSound('audioWin', 0.6);
            } else if (chance < 98) {
                const val = Math.floor(Math.random() * 16) + 20;
                result = { action: 'wheel_win', prize_name: `${val} ₲ (Сейф 🏦)`, amount: val };
                playSound('audioSuccess', 0.7);
            } else {
                const prizes = ['Префікс собі (3 дні)', 'Префікс другу', 'Мут учаснику (30 хв)', 'Захист від таргета'];
                const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
                result = { action: 'wheel_win', prize_name: `👑 ${randomPrize}`, amount: 0 };
                playSound('audioSuccess', 0.8);
            }

            // Зберігаємо час МИТТЄВО — таймер стартує одразу, навіть якщо юзер закриє вікно
            const now = new Date();
            safeStorage('set', 'mafia_last_spin', now.toISOString());
            lastSpinDate = now;

            // Надсилаємо дані боту МИТТЄВО — гарантія що бот отримає результат
            // навіть якщо юзер закриє вікно вручну не чекаючи
            tg.sendData(JSON.stringify(result));

            // Показуємо результат (вже не критично коли юзер закриє — дані вже надіслані)
            showResult(result.prize_name, result.amount);

        }, 3600);
    }

    function closeWheelApp() {
        tg.close();
    }

    // ===== АНІМОВАНИЙ ФОН: дим, золотий пил, карти, фішки, сигари =====
    (function() {
        const canvas = document.getElementById('bg-fx-canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let particles = [];

        function spawnDust(n) {
            for (let i = 0; i < n; i++) {
                particles.push({
                    type: 'dust',
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.25 + 0.08,
                    drift: Math.random() * 0.3 - 0.15,
                    opacity: Math.random() * 0.4 + 0.15
                });
            }
        }

        function spawnSymbol(n) {
            const symbols = [
                { char: '♠', color: [197, 160, 89] },
                { char: '♣', color: [197, 160, 89] },
                { char: '♥', color: [150, 70, 65] },
                { char: '♦', color: [150, 70, 65] },
                { char: '🎰', color: null },
                { char: '🚬', color: null },
                { char: '🪙', color: null }
            ];
            for (let i = 0; i < n; i++) {
                const s = symbols[Math.floor(Math.random() * symbols.length)];
                particles.push({
                    type: 'symbol',
                    char: s.char,
                    color: s.color,
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    speed: Math.random() * 0.3 + 0.12,
                    rotation: Math.random() * 360,
                    rotSpeed: Math.random() * 0.5 - 0.25,
                    opacity: Math.random() * 0.14 + 0.06,
                    size: Math.random() * 6 + 13
                });
            }
        }

        function spawnSmoke(n) {
            for (let i = 0; i < n; i++) {
                particles.push({
                    type: 'smoke',
                    x: Math.random() * canvas.width,
                    y: canvas.height + Math.random() * 50,
                    r: Math.random() * 30 + 20,
                    speed: Math.random() * 0.15 + 0.06,
                    drift: Math.random() * 0.15 - 0.075,
                    opacity: Math.random() * 0.03 + 0.015,
                    growth: Math.random() * 0.04 + 0.015
                });
            }
        }

        spawnDust(18);
        spawnSymbol(8);
        spawnSmoke(4);

        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                if (p.type === 'dust') {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(197, 160, 89, ${p.opacity})`;
                    ctx.fill();
                    p.y -= p.speed;
                    p.x += p.drift;
                    if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
                    if (p.x < -5) p.x = canvas.width + 5;
                    if (p.x > canvas.width + 5) p.x = -5;
                }

                if (p.type === 'symbol') {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.font = `${p.size}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    if (p.color) {
                        ctx.fillStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${p.opacity})`;
                        ctx.fillText(p.char, 0, 0);
                    } else {
                        ctx.globalAlpha = p.opacity * 2.5;
                        ctx.fillText(p.char, 0, 0);
                        ctx.globalAlpha = 1;
                    }
                    ctx.restore();

                    p.y += p.speed;
                    p.rotation += p.rotSpeed;
                    if (p.y > canvas.height + 20) {
                        p.y = -20;
                        p.x = Math.random() * canvas.width;
                    }
                }

                if (p.type === 'smoke') {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(180, 180, 180, ${p.opacity})`;
                    ctx.fill();
                    p.y -= p.speed;
                    p.x += p.drift;
                    p.r += p.growth;
                    p.opacity *= 0.997;
                    if (p.y < -p.r || p.opacity < 0.005) {
                        p.y = canvas.height + 30;
                        p.x = Math.random() * canvas.width;
                        p.r = Math.random() * 30 + 20;
                        p.opacity = Math.random() * 0.03 + 0.015;
                    }
                }
            });

            requestAnimationFrame(animateBg);
        }
        animateBg();
    })();
</script>
