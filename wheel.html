<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAILY SAFE</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; }
        body {
            background-color: var(--dark); color: #d1d1d1; font-family: 'Special Elite', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)), url('background.jpg');
            background-size: cover; background-position: center;
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; text-align: center; }

        .wheel-wrapper { position: relative; width: 300px; height: 300px; display: none; }
        .wheel-container {
            width: 100%; height: 100%; border: 5px solid var(--gold); border-radius: 50%;
            position: relative; overflow: hidden; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: #111; box-shadow: 0 0 30px rgba(197, 160, 89, 0.2);
        }
        .pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 30px; background: var(--gold); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10;
        }
        .spin-button {
            margin-top: 30px; padding: 15px 40px; font-size: 1.2rem; background: var(--gold);
            color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
            font-family: 'Cinzel', serif; transition: 0.3s;
        }
        .spin-button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #timer { margin-top: 20px; color: var(--gold); font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>СЕЙФ ДОНА</h1>

    <div class="wheel-wrapper" id="wheelWrapper">
        <div class="pointer"></div>
        <div class="wheel-container" id="wheel">
            </div>
    </div>

    <button class="spin-button" id="spinBtn" onclick="spinWheel()">ВІДКРИТИ СЕЙФ</button>
    <div id="timer">Завантаження...</div>

    <audio id="spinSound" src="https://www.soundjay.com/misc/sounds/mechanical-clonk-1.mp3"></audio>
    <audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-01.mp3"></audio>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const lastSpinFromURL = urlParams.get('spin');

        let lastSpinDate = (lastSpinFromURL && lastSpinFromURL !== 'never') 
            ? new Date(lastSpinFromURL) 
            : null;

        function updateTimer() {
            const now = new Date();
            const btn = document.getElementById('spinBtn');
            const timerDiv = document.getElementById('timer');
            const wheelDiv = document.getElementById('wheelWrapper');

            if (!lastSpinDate) {
                btn.disabled = false;
                timerDiv.innerText = "Сейф готовий до відкриття!";
                wheelDiv.style.display = 'block';
                return;
            }

            // ТАЙМЕР ПОВЕРНУТО НА 24 ГОДИНИ
            const nextSpin = new Date(lastSpinDate.getTime() + 24 * 60 * 60 * 1000);
            const diff = nextSpin - now;

            if (diff <= 0) {
                btn.disabled = false;
                timerDiv.innerText = "Сейф готовий до відкриття!";
                wheelDiv.style.display = 'block';
            } else {
                btn.disabled = true;
                wheelDiv.style.display = 'none';
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                timerDiv.innerText = `Наступна спроба через: ${h}г ${m}хв ${s}с`;
                setTimeout(updateTimer, 1000);
            }
        }

        function spinWheel() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            
            // Запуск звуку обертання
            document.getElementById('spinSound').play();

            const wheel = document.getElementById('wheel');
            const randomDeg = Math.floor(Math.random() * 360) + 3600; 
            wheel.style.transform = `rotate(${randomDeg}deg)`;

            setTimeout(() => {
                const chance = Math.random() * 100;
                let result;
                let isWinner = true;

                if (chance < 40) { 
                    result = { action: 'wheel_win', prize_name: 'Порожньо 💨', amount: 0 };
                    isWinner = false; 
                } else if (chance < 80) { 
                    const val = Math.floor(Math.random() * 2) + 1;
                    result = { action: 'wheel_win', prize_name: `${val} ₲ (Мідь 🪙)`, amount: val };
                } else if (chance < 94) { 
                    const val = Math.floor(Math.random() * 11) + 5;
                    result = { action: 'wheel_win', prize_name: `${val} ₲ (Гаманець 💰)`, amount: val };
                } else if (chance < 97) { 
                    const val = Math.floor(Math.random() * 16) + 20;
                    result = { action: 'wheel_win', prize_name: `${val} ₲ (СЕЙФ 🏦)`, amount: val };
                } else { 
                    const prizes = ['Префікс собі (3 дні)', 'Префікс другу', 'Мут учаснику (30 хв)', 'Захист від таргета'];
                    const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
                    result = { action: 'wheel_win', prize_name: `👑 ${randomPrize}`, amount: 0 };
                }

                // Якщо виграв — грає переможний звук
                if (isWinner) {
                    document.getElementById('winSound').play();
                }

                const now = new Date();
                localStorage.setItem('mafia_last_spin', now.toISOString());
                lastSpinDate = now;

                alert(`Ви відкрили сейф: ${result.prize_name}`);
                tg.sendData(JSON.stringify(result));
                
                setTimeout(() => tg.close() , 500);
            }, 4100);
        }

        updateTimer();
    </script>
</body>
</html>
