<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АДМІН-ПАНЕЛЬ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059; --gold-light: #e8c97a; --gold-dark: #8a6a2a;
            --dark: #0a0a0a; --dark2: #111; --text: #d1d1d1; --text-dim: #666; --border: #2a2a2a;
            --fs-title: clamp(14px,4vw,20px); --fs-body: clamp(11px,3vw,14px);
            --fs-small: clamp(9px,2.3vw,11px); --fs-btn: clamp(10px,2.6vw,13px);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--dark);color:var(--text);font-family:'Cinzel','Times New Roman',serif;-webkit-font-smoothing:antialiased;min-height:100vh;background-image:radial-gradient(ellipse at top,rgba(197,160,89,0.04) 0%,transparent 60%),linear-gradient(rgba(0,0,0,0.9),rgba(0,0,0,0.95))}
        .container{max-width:480px;margin:0 auto;padding:12px 12px 32px;position:relative;z-index:1}
        header{text-align:center;padding:16px 0 12px;margin-bottom:16px}
        .header-line{display:flex;align-items:center;gap:10px;margin-bottom:6px}
        .header-line::before,.header-line::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dark))}
        .header-line::after{background:linear-gradient(90deg,var(--gold-dark),transparent)}
        h1{font-size:var(--fs-title);font-weight:900;color:var(--gold);letter-spacing:0.2em;text-transform:uppercase}
        .header-sub{font-family:'IM Fell English',serif;font-style:italic;font-size:var(--fs-small);color:var(--gold-dark);margin-top:3px}
        .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
        .stat-box{background:rgba(15,12,5,0.95);border:1px solid var(--border);padding:12px;text-align:center}
        .stat-val{font-size:clamp(18px,5vw,24px);font-weight:900;color:var(--gold)}
        .stat-label{font-size:var(--fs-small);color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-top:3px;font-family:'IM Fell English',serif;font-style:italic}
        .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
        .tab{padding:10px 4px;text-align:center;cursor:pointer;border:1px solid var(--border);background:rgba(15,12,5,0.95);font-size:var(--fs-small);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-dim);transition:all 0.2s;-webkit-tap-highlight-color:transparent}
        .tab.active{border-color:var(--gold-dark);color:var(--gold);background:rgba(25,18,5,0.98)}
        .tab:active{transform:scale(0.97)}
        .section{display:none}.section.active{display:block}
        .section-title{font-size:var(--fs-small);letter-spacing:0.2em;color:var(--gold-dark);text-transform:uppercase;margin:0 0 10px;display:flex;align-items:center;gap:8px}
        .section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
        .search-box{background:rgba(0,0,0,0.6);border:1px solid var(--border);border-bottom-color:var(--gold-dark);color:#fff;padding:10px 14px;font-family:'Cinzel',serif;font-size:var(--fs-body);width:100%;outline:none;margin-bottom:12px;-webkit-appearance:none;border-radius:0}
        .search-box::placeholder{color:var(--text-dim);font-style:italic}
        .user-item{background:rgba(15,12,5,0.95);border:1px solid var(--border);padding:10px 14px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color 0.2s;-webkit-tap-highlight-color:transparent}
        .user-item:active{border-color:var(--gold-dark)}
        .user-item.banned{border-left:2px solid #8b2a2a}
        .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dark),#1a1a1a);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--gold);flex-shrink:0}
        .user-info{flex:1;overflow:hidden}
        .user-name{font-size:var(--fs-btn);font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .user-meta{font-size:var(--fs-small);color:var(--text-dim);font-family:'IM Fell English',serif;font-style:italic}
        .user-bal{font-size:var(--fs-btn);font-weight:700;color:var(--gold);white-space:nowrap;flex-shrink:0}
        .ban-badge{font-size:9px;background:rgba(139,42,42,0.3);color:#c56060;border:1px solid #8b2a2a;padding:1px 5px;flex-shrink:0}
        .req-item{background:rgba(15,12,5,0.95);border:1px solid var(--border);border-left:2px solid var(--gold-dark);padding:12px 14px;margin-bottom:8px}
        .req-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
        .req-name{font-size:var(--fs-btn);font-weight:700;color:var(--text)}
        .req-price{font-size:var(--fs-btn);font-weight:700;color:var(--gold)}
        .req-action{font-size:var(--fs-small);color:var(--text-dim);margin-bottom:6px;font-family:'IM Fell English',serif;font-style:italic}
        .req-date{font-size:var(--fs-small);color:#444}
        .req-btns{display:flex;gap:6px;margin-top:8px}
        .req-btn{flex:1;padding:8px;font-family:'Cinzel',serif;font-size:var(--fs-small);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;border:1px solid;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
        .req-btn:active{transform:scale(0.97)}
        .req-btn-approve{background:rgba(42,107,42,0.2);border-color:#2a6b2a;color:#5a9a5a}
        .req-btn-reject{background:rgba(139,42,42,0.2);border-color:#8b2a2a;color:#c56060}
        .prefix-item{background:rgba(15,12,5,0.95);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px}
        .prefix-top{display:flex;justify-content:space-between;margin-bottom:4px}
        .prefix-name{font-size:var(--fs-btn);font-weight:700;color:var(--text)}
        .prefix-text{font-size:var(--fs-btn);color:var(--gold);font-family:'IM Fell English',serif;font-style:italic}
        .prefix-timer{font-size:var(--fs-small);color:var(--text-dim);margin-top:4px}
        .prefix-timer.urgent{color:#c56060}
        .modal{display:none;position:fixed;inset:0;z-index:1000;align-items:flex-end;justify-content:center;padding:0}
        .modal.show{display:flex}
        .modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.85)}
        .modal-box{position:relative;z-index:1;background:linear-gradient(160deg,#0d0b05,#161200);border:1px solid var(--gold-dark);border-bottom:none;padding:24px 20px 32px;width:100%;max-width:480px;animation:slideUp 0.3s cubic-bezier(0.34,1.3,0.64,1);max-height:80vh;overflow-y:auto}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .modal-close{position:absolute;top:12px;right:14px;background:transparent;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;-webkit-tap-highlight-color:transparent}
        .profile-name{font-size:clamp(14px,4vw,18px);font-weight:700;color:var(--gold);margin-bottom:12px}
        .profile-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:var(--fs-body)}
        .profile-row:last-of-type{border-bottom:none}
        .profile-key{color:var(--text-dim)}
        .profile-val{color:var(--text);font-weight:700;text-align:right;max-width:60%;word-break:break-all}
        .profile-actions{display:flex;gap:8px;margin-top:16px}
        .profile-btn{flex:1;padding:12px;font-family:'Cinzel',serif;font-size:var(--fs-small);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;border:1px solid;-webkit-tap-highlight-color:transparent;transition:all 0.15s}
        .profile-btn:active{transform:scale(0.97)}
        .profile-btn-ban{background:rgba(139,42,42,0.2);border-color:#8b2a2a;color:#c56060}
        .profile-btn-unban{background:rgba(42,107,42,0.2);border-color:#2a6b2a;color:#5a9a5a}
        .profile-prefix{background:rgba(197,160,89,0.08);border:1px solid var(--gold-dark);padding:8px 10px;margin-top:6px;font-size:var(--fs-small);color:var(--text-dim)}
        #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,14,5,0.97);border:1px solid var(--gold-dark);color:var(--gold);font-size:var(--fs-small);letter-spacing:0.1em;padding:10px 18px;z-index:3000;opacity:0;transition:all 0.3s;pointer-events:none;text-align:center;max-width:280px}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        .empty-state{text-align:center;padding:30px;font-family:'IM Fell English',serif;font-style:italic;color:var(--text-dim);font-size:var(--fs-body)}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <div id="toast"></div>
    <div id="profile-modal" class="modal">
        <div class="modal-backdrop" onclick="closeProfile()"></div>
        <div class="modal-box" id="profile-content"><button class="modal-close" onclick="closeProfile()">✕</button></div>
    </div>
    <div class="container">
        <header>
            <div class="header-line"><span style="color:var(--gold-dark);font-size:8px">◆</span></div>
            <h1>Адмін-панель</h1>
            <div class="header-sub">Mafia Guerrera · Управління</div>
            <div class="header-line" style="margin-top:6px"><span style="color:var(--gold-dark);font-size:8px">◆</span></div>
        </header>
        <div class="stats-row">
            <div class="stat-box"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Всього гравців</div></div>
            <div class="stat-box"><div class="stat-val" id="stat-banned">—</div><div class="stat-label">Заблоковано</div></div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('users')">👥 Гравці</div>
            <div class="tab" onclick="switchTab('requests')">📋 Заявки</div>
            <div class="tab" onclick="switchTab('prefixes')">🏷️ Префікси</div>
            <div class="tab" onclick="switchTab('search')">🔍 Пошук</div>
        </div>
        <div id="tab-users" class="section active">
            <div class="section-title">Список гравців</div>
            <div id="users-list"></div>
        </div>
        <div id="tab-requests" class="section">
            <div class="section-title">Активні заявки</div>
            <div id="requests-list"></div>
        </div>
        <div id="tab-prefixes" class="section">
            <div class="section-title">Активні префікси</div>
            <div id="prefixes-list"></div>
        </div>
        <div id="tab-search" class="section">
            <div class="section-title">Пошук гравця</div>
            <input class="search-box" type="text" id="search-input" placeholder="ID або @username або ім'я..." oninput="doSearch()">
            <div id="search-results"></div>
        </div>
    </div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const urlParams = new URLSearchParams(window.location.search);
    const adminId = urlParams.get('admin_id');
    let allUsers = [], pendingRequests = [], activePrefixes = [];
    try { allUsers = JSON.parse(decodeURIComponent(urlParams.get('users') || '[]')); } catch(e){}
    try { pendingRequests = JSON.parse(decodeURIComponent(urlParams.get('pending') || '[]')); } catch(e){}
    try { activePrefixes = JSON.parse(decodeURIComponent(urlParams.get('prefixes') || '[]')); } catch(e){}
    document.getElementById('stat-total').textContent = allUsers.length;
    document.getElementById('stat-banned').textContent = allUsers.filter(u => u.banned).length;

    function switchTab(name) {
        const names = ['users','requests','prefixes','search'];
        document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i] === name));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
    }

    let toastTimer;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    function createUserItem(u) {
        const div = document.createElement('div');
        div.className = 'user-item' + (u.banned ? ' banned' : '');
        const initial = (u.name || '?')[0].toUpperCase();
        const username = u.username ? '@' + u.username : 'ID: ' + u.id;
        div.innerHTML = `
            <div class="user-avatar">${initial}</div>
            <div class="user-info">
                <div class="user-name">${u.name}</div>
                <div class="user-meta">${username}</div>
            </div>
            <div class="user-bal">${u.bal} ₲</div>
            ${u.banned ? '<span class="ban-badge">БАН</span>' : ''}
        `;
        div.onclick = () => openProfile(u);
        return div;
    }

    function renderUsers(users, containerId) {
        const c = document.getElementById(containerId);
        c.innerHTML = '';
        if (!users.length) { c.innerHTML = '<div class="empty-state">Гравців не знайдено</div>'; return; }
        users.forEach(u => c.appendChild(createUserItem(u)));
    }
    renderUsers(allUsers, 'users-list');

    let currentProfile = null;
    function openProfile(u) {
        currentProfile = u;
        const content = document.getElementById('profile-content');
        const username = u.username ? '@' + u.username : '—';
        const joined = u.joined ? u.joined.slice(0,10) : '—';
        const userPrefixes = activePrefixes.filter(p => String(p.user_id) === String(u.id));
        let prefixHtml = '';
        if (userPrefixes.length) {
            prefixHtml = '<div style="margin-top:12px;font-size:var(--fs-small);color:var(--gold-dark);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">Активні префікси</div>';
            userPrefixes.forEach(p => {
                prefixHtml += `<div class="profile-prefix">📛 ${p.prefix} · до ${p.expire ? p.expire.slice(0,16) : '?'}</div>`;
            });
        }
        const banBtn = u.banned
            ? `<button class="profile-btn profile-btn-unban" onclick="doAction('panel_unban')">✅ Розбанити</button>`
            : `<button class="profile-btn profile-btn-ban" onclick="doAction('panel_ban')">🚫 Забанити</button>`;
        content.innerHTML = `
            <button class="modal-close" onclick="closeProfile()">✕</button>
            <div class="profile-name">${u.name} ${u.banned ? '🚫' : ''}</div>
            <div class="profile-row"><span class="profile-key">ID</span><span class="profile-val"><code>${u.id}</code></span></div>
            <div class="profile-row"><span class="profile-key">Username</span><span class="profile-val">${username}</span></div>
            <div class="profile-row"><span class="profile-key">Баланс</span><span class="profile-val" style="color:var(--gold)">${u.bal} ₲</span></div>
            <div class="profile-row"><span class="profile-key">Приєднався</span><span class="profile-val">${joined}</span></div>
            <div class="profile-row"><span class="profile-key">Статус</span><span class="profile-val" style="color:${u.banned ? '#c56060' : '#5a9a5a'}">${u.banned ? 'Заблокований' : 'Активний'}</span></div>
            ${prefixHtml}
            <div class="profile-actions">${banBtn}</div>
        `;
        document.getElementById('profile-modal').classList.add('show');
    }

    function closeProfile() {
        document.getElementById('profile-modal').classList.remove('show');
        currentProfile = null;
    }

    function doAction(action) {
        if (!currentProfile) return;
        tg.sendData(JSON.stringify({ action, user_id: currentProfile.id }));
        if (action === 'panel_ban') { currentProfile.banned = 1; showToast('🚫 Заявку на бан відправлено'); }
        else { currentProfile.banned = 0; showToast('✅ Заявку на розбан відправлено'); }
        const idx = allUsers.findIndex(x => x.id === currentProfile.id);
        if (idx >= 0) allUsers[idx] = currentProfile;
        renderUsers(allUsers, 'users-list');
        document.getElementById('stat-banned').textContent = allUsers.filter(u => u.banned).length;
        closeProfile();
    }

    // REQUESTS
    function renderRequests() {
        const c = document.getElementById('requests-list');
        c.innerHTML = '';
        if (!pendingRequests.length) { c.innerHTML = '<div class="empty-state">Активних заявок немає 🎩</div>'; return; }
        pendingRequests.forEach(r => {
            const div = document.createElement('div');
            div.className = 'req-item';
            div.innerHTML = `
                <div class="req-top"><div class="req-name">${r.user_name}</div><div class="req-price">${r.price} ₲</div></div>
                <div class="req-action">${r.action}${r.details ? ' · ' + r.details : ''}</div>
                <div class="req-date">${r.created_at ? r.created_at.slice(0,16) : ''}</div>
                <div class="req-btns">
                    <button class="req-btn req-btn-approve" onclick="approveReq(${r.id},this)">✅ Схвалити</button>
                    <button class="req-btn req-btn-reject" onclick="rejectReq(${r.id},this)">❌ Відхилити</button>
                </div>
            `;
            c.appendChild(div);
        });
    }
    renderRequests();

    function approveReq(reqId, btn) {
        tg.sendData(JSON.stringify({ action: 'panel_approve_request', req_id: reqId }));
        const item = btn.closest('.req-item');
        item.style.opacity = '0.4'; item.style.pointerEvents = 'none';
        showToast('✅ Заявку схвалено');
    }
    function rejectReq(reqId, btn) {
        tg.sendData(JSON.stringify({ action: 'panel_reject_request', req_id: reqId }));
        const item = btn.closest('.req-item');
        item.style.opacity = '0.4'; item.style.pointerEvents = 'none';
        showToast('❌ Заявку відхилено');
    }

    // PREFIXES
    function renderPrefixes() {
        const c = document.getElementById('prefixes-list');
        c.innerHTML = '';
        if (!activePrefixes.length) { c.innerHTML = '<div class="empty-state">Активних префіксів немає</div>'; return; }
        activePrefixes.forEach(p => {
            const div = document.createElement('div');
            div.className = 'prefix-item';
            const expireDate = p.expire ? new Date(p.expire.replace(' ','T') + (p.expire.includes('Z') ? '' : 'Z')) : null;
            const now = new Date();
            let timerText = '—', urgent = false;
            if (expireDate) {
                const diff = expireDate - now;
                if (diff > 0) {
                    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
                    timerText = `Залишилось: ${h}г ${m}хв`;
                    urgent = diff < 3600000;
                } else { timerText = '⚠️ Час вийшов!'; urgent = true; }
            }
            const username = p.username && p.username !== 'NoUsername' ? '@' + p.username : 'ID: ' + p.user_id;
            div.innerHTML = `
                <div class="prefix-top">
                    <div class="prefix-name">${p.user_name}</div>
                    <div style="font-size:var(--fs-small);color:var(--text-dim)">${username}</div>
                </div>
                <div class="prefix-text">📛 ${p.prefix}</div>
                <div class="prefix-timer ${urgent ? 'urgent' : ''}">${timerText}</div>
            `;
            c.appendChild(div);
        });
    }
    renderPrefixes();

    // SEARCH
    function doSearch() {
        const q = document.getElementById('search-input').value.trim().toLowerCase();
        const c = document.getElementById('search-results');
        c.innerHTML = '';
        if (!q) return;
        const results = allUsers.filter(u =>
            String(u.id).includes(q) ||
            (u.username && u.username.toLowerCase().includes(q.replace('@',''))) ||
            (u.name && u.name.toLowerCase().includes(q))
        );
        if (!results.length) { c.innerHTML = '<div class="empty-state">Нічого не знайдено</div>'; return; }
        results.forEach(u => c.appendChild(createUserItem(u)));
    }
</script>
</body>
</html>
