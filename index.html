<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA GUERRERA CABINET</title>
    <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:wght@700&family=Special+Elite&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --btn-bg: rgba(20, 20, 20, 0.95); }
        body {
            background-color: var(--dark); color: #d1d1d1; font-family: 'Special Elite', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('background.jpg');
            background-size: cover; background-attachment: fixed; background-position: center;
            overflow-x: hidden;
        }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        header { text-align: center; border-bottom: 2px double var(--gold); padding-bottom: 15px; margin-bottom: 25px; }
        h1 { font-family: 'Old Standard TT', serif; color: var(--gold); margin: 0; letter-spacing: 3px; text-transform: uppercase; font-size: 24px; }
        
        .balance-card {
            background: rgba(15, 15, 15, 0.95); border: 1px solid var(--gold);
            padding: 20px; text-align: center; margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(197, 160, 89, 0.1);
        }
        .balance-val { font-size: 32px; color: #fff; margin: 5px 0; font-weight: bold; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .menu-item {
            background: var(--btn-bg); border: 1px solid #333; padding: 15px 10px;
            text-align: center; cursor: pointer; display: flex; flex-direction: column;
            justify-content: center; min-height: 80px; transition: 0.3s;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .menu-item:active { transform: scale(0.95); border-color: var(--gold); }
        .menu-item.full { grid-column: span 2; min-height: 60px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #111; border: 1px solid var(--gold); padding: 25px;
            width: 85%; text-align: center; position: relative;
        }
        .modal-content h3 { font-family: 'Cinzel', serif; text-transform: uppercase; color: var(--gold); letter-spacing: 1.5px; }
        
        input {
            background: #000; border: 1px solid var(--gold); color: #fff;
            padding: 12px; font-family: 'Special Elite', cursive; width: 90%;
            margin: 10px 0; text-align: center; outline: none;
        }
        
        .btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 10px 20px; cursor: pointer; font-family: 'Special Elite', cursive;
            margin: 10px 5px; text-transform: uppercase;
        }
        .btn-confirm { background: var(--gold); color: #000; font-weight: bold; }
        
        #success-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: var(--gold);
        }
        .hidden { display: none; }
    </style>
</head>
<body onclick="playClick()">
    <audio id="successSound" src="success.mp3" preload="auto"></audio>
    <audio id="clickSound" src="typewriter.mp3" preload="auto"></audio>
    <audio id="bgMusic" src="mafia_theme.mp3" loop preload="auto"></audio>

    <div id="success-overlay">
        <h2 style="font-size: 60px; margin-bottom: 10px;">✅</h2>
        <p id="success-text" style="font-size: 18px; line-height: 1.5;">Дякуємо!<br>Очікуйте сповіщення від сім'ї</p>
    </div>

    <div class="container" id="app">
        <header>
            <h1>MAFIA GUERRERA</h1>
            <div style="font-size: 10px; color: #888; margin-top: 5px;">EST. 08.11.2021</div>
        </header>

        <div class="balance-card">
            <div style="font-size: 10px; letter-spacing: 2px;">ВАШ БАЛАНС</div>
            <div id="balance-val" class="balance-val">0 ₲</div>
            <div id="user-name" style="color: var(--gold); font-size: 14px;">Завантаження...</div>
        </div>

        <div id="main-menu" class="menu-grid">
            <div class="menu-item" onclick="showView('prefix-view')">✒️ ТИТУЛИ ТА АДМІНКА</div>
            <div class="menu-item" onclick="showView('transfer-view')">💸 ДІНЕРО ТА ПЕРЕКАЗИ</div>
            <div class="menu-item full" onclick="showView('shop-view')">🎩 ЛАВКА БУТЛЕГЕРА</div>
        </div>

        <div id="prefix-view" class="hidden">
            <button class="btn" onclick="showView('main-menu')">← НАЗАД</button>
            <div class="menu-grid" style="margin-top:20px">
                <div class="menu-item" onclick="startPrefixSelf()">ПРЕФІКС ДЛЯ СЕБЕ (15 ₲/дн)</div>
                <div class="menu-item" onclick="startPrefixFriend()">ПРЕФІКС ДЛЯ ДРУГА (20 ₲/дн)</div>
                <div class="menu-item full" onclick="startAdminStatus()">👑 СТАТУС АДМІНА (50 ₲/дн)</div>
            </div>
        </div>

        <div id="transfer-view" class="hidden">
            <button class="btn" onclick="showView('main-menu')">← НАЗАД</button>
            <div class="menu-grid" style="margin-top:20px">
                <div class="menu-item" onclick="startBuyDine()">💳 КУПИТИ ДІНЕРО</div>
                <div class="menu-item" onclick="startSellDine()">📤 ПРОДАТИ (ВИВІД)</div>
                <div class="menu-item full" onclick="startTransferDine()">🔄 ПЕРЕДАТИ ДРУГОВІ</div>
            </div>
        </div>

        <div id="shop-view" class="hidden">
            <button class="btn" onclick="showView('main-menu')">← НАЗАД</button>
            <div id="shop-container" style="margin-top:20px; max-height: 60vh; overflow-y: auto; padding-right: 5px;"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content" id="modal-content"></div>
    </div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    const urlParams = new URLSearchParams(window.location.search);
    let userBalance = parseFloat(urlParams.get('bal')) || 0;
    const userId = urlParams.get('id');
    const userNameParam = urlParams.get('name');

    document.getElementById('balance-val').innerText = userBalance.toLocaleString() + " ₲";
    document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || decodeURIComponent(userNameParam || "") || "Користувач";

    let musicStarted = false;
    const bgMusic = document.getElementById('bgMusic');
    bgMusic.volume = 0.15; 

    function playClick() {
        const clickSound = document.getElementById('clickSound');
        clickSound.currentTime = 0;
        clickSound.play().catch(() => {});
        if (!musicStarted) { bgMusic.play().catch(() => {}); musicStarted = true; }
    }

    document.addEventListener("visibilitychange", () => {
        if (document.hidden) bgMusic.pause();
        else if (musicStarted) bgMusic.play().catch(() => {});
    });

    function showView(id) {
        playClick();
        document.querySelectorAll('#app > div:not(.balance-card):not(header)').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function openModal(html) {
        playClick();
        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        playClick();
        document.getElementById('modal').style.display = 'none';
    }

    function finishAction(actionData) {
        const sound = document.getElementById('successSound');
        sound.play().catch(() => {});
        try { tg.sendData(JSON.stringify(actionData)); } catch (e) { console.log("Error:", e); }
        document.getElementById('success-overlay').style.display = 'flex';
        setTimeout(() => { document.getElementById('success-overlay').style.display = 'none'; }, 2000);
    }

    // --- ФУНКЦІЇ МЕНЮ (Без змін) ---
    function startPrefixSelf() {
        openModal(`<h3>ПРЕФІКС ДЛЯ СЕБЕ</h3><input type="number" id="p_days" placeholder="Кількість днів" min="1" value="30"><input type="text" id="p_text" placeholder="Текст префікса"><p id="p_price">Ціна: 450 ₲</p><button class="btn btn-confirm" onclick="confirmPrefix('buy_prefix_self')">ЗАМОВИТИ</button><button class="btn" onclick="closeModal()">СКАСУВАТИ</button>`);
        document.getElementById('p_days').oninput = (e) => { document.getElementById('p_price').innerText = `Ціна: ${e.target.value * 15} ₲`; };
    }
    function startPrefixFriend() {
        openModal(`<h3>ПРЕФІКС ДЛЯ ДРУГА</h3><input type="number" id="p_target" placeholder="ID друга (цифри)"><input type="number" id="p_days" placeholder="Кількість днів" min="1" value="30"><input type="text" id="p_text" placeholder="Текст префікса"><button class="btn btn-confirm" onclick="confirmPrefix('buy_prefix_friend')">ПОДАРУВАТИ</button><button class="btn" onclick="closeModal()">СКАСУВАТИ</button>`);
    }
    function confirmPrefix(action) {
        const days = document.getElementById('p_days').value;
        const text = document.getElementById('p_text').value;
        const target = document.getElementById('p_target')?.value || null;
        const pricePerDay = action === 'buy_prefix_self' ? 15 : 20;
        const total = days * pricePerDay;
        if (!text || days < 1) return alert("Заповніть всі поля!");
        if (userBalance < total) return alert("Недостатньо дінеро!");
        finishAction({ action, days, text, target_id: target, price: total });
    }
    function startAdminStatus() {
        openModal(`<h3>👑 СТАТУС АДМІНА</h3><p>Ціна: 50 ₲ / день</p><input type="number" id="adm_days" placeholder="Кількість днів" min="3" value="3"><button class="btn btn-confirm" onclick="confirmAdmin()">ПРИДБАТИ</button><button class="btn" onclick="closeModal()">СКАСУВАТИ</button>`);
    }
    function confirmAdmin() {
        const days = document.getElementById('adm_days').value;
        const total = days * 50;
        if (days < 3) return alert("Мінімальне замовлення — 3 дні!");
        if (userBalance < total) return alert("Недостатньо дінеро!");
        finishAction({ action: 'buy_admin', days, price: total });
    }
    function startBuyDine() {
        openModal(`<h3>КУПИТИ ДІНЕРО</h3><p>1 грн = 1 ₲</p><input type="number" id="buy_amount" placeholder="Сума (грн)" min="10"><button class="btn btn-confirm" onclick="confirmBuy()">ОТРИМАТИ РЕКВІЗИТИ</button><button class="btn" onclick="closeModal()">СКАСУВАТИ</button>`);
    }
    function confirmBuy() {
        const amount = document.getElementById('buy_amount').value;
        if (amount < 10) return alert("Мінімальна сума — 10 грн");
        finishAction({ action: 'buy_dinero', amount });
    }
    function startSellDine() {
        openModal(`<h3>ПРОДАТИ ДІНЕРО</h3><p style="font-size:12px; color:var(--gold)">Курс продажу 10:1.<br>10 дінеро можна обміняти на 1 грн.</p><input type="number" id="s_amount" placeholder="Сума ₲"><input type="text" id="s_card" placeholder="Номер картки"><button class="btn btn-confirm" onclick="confirmSell()">ПІДТВЕРДИТИ</button><button class="btn" onclick="closeModal()">СКАСУВАТИ</button>`);
    }
    function confirmSell() {
        const amount = document.getElementById('s_amount').value;
        const card = document.getElementById('s_card').value;
        if (!amount || !card) return alert("Заповніть всі поля!");
        finishAction({ action: 'sell_dinero', amount, card });
    }
    function startTransferDine() {
        openModal(`<h3>ПЕРЕДАТИ ДІНЕРО</h3><input type="number" id="t_target" placeholder="ID отримувача"><input type="number" id="t_amount" placeholder="Сума ₲"><p style="font-size:10px">Комісія сім'ї: 10%</p><button class="btn btn-confirm" onclick="confirmTransfer()">ВІДПРАВИТИ</button><button class="btn" onclick="closeModal()">СКАСУВАТИ</button>`);
    }
    function confirmTransfer() {
        const target = document.getElementById('t_target').value;
        const amount = document.getElementById('t_amount').value;
        if (userBalance < amount) return alert("Недостатньо коштів!");
        finishAction({ action: 'transfer', target_id: target, amount });
    }

    const items = [["Змінити префікс гравцеві", 20],["Змінити префікс Адміну", 40],["Зняти варн", 150],["Зняти бан", 300],["Дати мут адміністратору (30 хв)", 200],["Захист від таргета", 50],["Фільтр", 50],["Проведення супергри", 70],["Образливий преф (на добу)", 400],["Зняти образливий преф", 550],["Бан (на 12 годин)", 300],["Зняти мут (на 30 хв)", 50],["Мут учаснику (30 хв)", 50],["Мут учаснику (60 хв)", 100],["Бан адміну (12 годин)", 1000]];
    const shop = document.getElementById('shop-container');
    items.forEach(i => {
        const d = document.createElement('div');
        d.className = 'menu-item full'; d.style.marginBottom = '10px';
        d.innerHTML = `<div>${i[0]}</div><div style="color:var(--gold)">${i[1]} ₲</div>`;
        d.onclick = () => {
            playClick();
            if (userBalance < i[1]) return alert("Недостатньо дінеро!");
            openModal(`<h3>ПІДТВЕРДЖЕННЯ</h3><p>Придбати "${i[0]}" за ${i[1]} ₲?</p><button class="btn btn-confirm" onclick="finishAction({action:'shop_buy', item:'${i[0]}', price:${i[1]}})">ПІДТВЕРДИТИ</button><button class="btn" onclick="closeModal()">СКАСУВАТИ</button>`);
        };
        shop.appendChild(d);
    });
</script>
</body>
</html>
